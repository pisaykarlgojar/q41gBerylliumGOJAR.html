<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Movie CRUD Exercise</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#556b98;
    display:flex;
    justify-content:center;
    margin-top:40px;
    overflow:hidden;
}

/* bouncing dvd logo layer */
#dvd{
    position:fixed;
    width:120px;
    pointer-events:none;
    z-index:999;
}

.container{
    width:420px;
    background:white;
    padding:25px;
    border-radius:10px;

    /* enhanced shadow */
    box-shadow:
        0 8px 20px rgba(0,0,0,0.25),
        0 2px 6px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
}

label{
    font-weight:bold;
    margin-top:10px;
    display:block;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    margin-top:15px;
    padding:10px;
    border:none;
    background:#1976d2;
    color:white;
    border-radius:5px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#1565c0;
}

.star{
    font-size:22px;
    cursor:pointer;
    color:lightgray;
}

.yellow{
    color:gold;
}

.movie-card{
    background:#f5f5f5;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
}

.error{
    border:2px solid red;
    box-shadow:0 0 8px red;
    animation:shake 0.25s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-3px)}
50%{transform:translateX(3px)}
75%{transform:translateX(-3px)}
100%{transform:translateX(0)}
}

</style>
</head>

<body>

<!-- DVD LOGO -->
<img id="dvd" src="https://bouncingdvdlogo.com/image.png">

<div class="container">

<h2>Add a Movie</h2>

<label>Title:</label>
<input id="title" type="text">

<label>Year:</label>
<input id="year" type="text">

<label>Genre:</label>
<select id="genre">
<option value="">Select Genre</option>
<option>Action</option>
<option>Comedy</option>
<option>Drama</option>
<option>Fantasy</option>
<option>Sci-Fi</option>
</select>

<label>Rating:</label>
<div id="stars">
<span class="star" data-value="1">★</span>
<span class="star" data-value="2">★</span>
<span class="star" data-value="3">★</span>
<span class="star" data-value="4">★</span>
<span class="star" data-value="5">★</span>
</div>

<button id="addMovie">Add Movie</button>

<h2>Movie List</h2>
<div id="movieList"></div>

</div>

<script>

/* ---------- STAR RATING ---------- */

let rating = 0;

const stars = document.querySelectorAll(".star");

stars.forEach((star)=>{
    star.addEventListener("click", function(){

        rating = Number(this.dataset.value);

        stars.forEach((s,index)=>{
            if(index < rating){
                s.classList.add("yellow");
            }else{
                s.classList.remove("yellow");
            }
        });

    });
});

/* ---------- VALIDATION ---------- */

document.getElementById("addMovie").addEventListener("click", addMovie);

function flashError(element){
    element.classList.add("error");

    setTimeout(()=>{
        element.classList.remove("error");
    },600);
}

function addMovie(){

    const titleInput = document.getElementById("title");
    const yearInput = document.getElementById("year");
    const genreInput = document.getElementById("genre");

    const title = titleInput.value.trim();
    const year = yearInput.value.trim();
    const genre = genreInput.value;

    let valid = true;

    if(title === ""){
        flashError(titleInput);
        valid = false;
    }

    if(year === "" || !Number.isInteger(Number(year))){
        flashError(yearInput);
        valid = false;
    }

    if(genre === ""){
        flashError(genreInput);
        valid = false;
    }

    if(rating === 0){
        stars.forEach(s=>flashError(s));
        valid = false;
    }

    if(!valid) return;

    const movie = {
        title:title,
        year:year,
        genre:genre,
        rating:rating.toString()
    };

    let movies = JSON.parse(localStorage.getItem("movies") || "[]");

    movies.push(movie);

    localStorage.setItem("movies", JSON.stringify(movies));

    displayMovies();

    titleInput.value="";
    yearInput.value="";
    genreInput.value="";

    rating=0;
    stars.forEach(s=>s.classList.remove("yellow"));
}

/* ---------- DISPLAY MOVIES ---------- */

function displayMovies(){

    const movieList = document.getElementById("movieList");

    movieList.innerHTML="";

    const movies = JSON.parse(localStorage.getItem("movies") || "[]");

    movies.forEach(movie=>{

        const starDisplay = "★".repeat(movie.rating);

        const div = document.createElement("div");
        div.className="movie-card";

        div.innerHTML=`
        ${movie.title} (${movie.year}) - ${movie.genre}, Rating:
        <span style="color:gold">${starDisplay}</span>
        `;

        movieList.appendChild(div);

    });

}

window.onload = displayMovies;


/* ---------- BOUNCING DVD ---------- */

const dvd = document.getElementById("dvd");

let x = 100;
let y = 100;

let dx = 2.2;
let dy = 2.2;

function moveDVD(){

    const width = window.innerWidth;
    const height = window.innerHeight;

    const logoWidth = dvd.offsetWidth;
    const logoHeight = dvd.offsetHeight;

    x += dx;
    y += dy;

    if(x + logoWidth >= width || x <= 0){
        dx = -dx;
    }

    if(y + logoHeight >= height || y <= 0){
        dy = -dy;
    }

    dvd.style.left = x + "px";
    dvd.style.top = y + "px";

    requestAnimationFrame(moveDVD);
}

moveDVD();

</script>

</body>
</html>
